services:
  a2a-document-generator:
    build: .
    container_name: a2a-document-generator
    environment:
      # Pass the Gemini key into the container
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - AGENT_PUBLIC_URL=${AGENT_PUBLIC_URL}
      - OUTPUT_DIR=/app/output
    ports:
      - "10010:5000"
    volumes:
      - ./output:/app/output
    networks:
      - agents-net

networks:
  agents-net:
    external: true

